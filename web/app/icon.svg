<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>

  <!-- Yellow-green circle -->
  <circle cx="256" cy="256" r="256" fill="#c8d42a"/>

  <!-- Long flat shadow -->
  <polygon points="190,512 512,190 512,512" fill="#000" opacity="0.18" clip-path="url(#c)"/>

  <!-- Spreadsheet right panel -->
  <rect x="255" y="144" width="168" height="222" rx="6" fill="#1e7d35" clip-path="url(#c)"/>
  <line x1="339" y1="144" x2="339" y2="366" stroke="white" stroke-width="5" opacity="0.85" clip-path="url(#c)"/>
  <line x1="255" y1="199" x2="423" y2="199" stroke="white" stroke-width="5" opacity="0.85" clip-path="url(#c)"/>
  <line x1="255" y1="254" x2="423" y2="254" stroke="white" stroke-width="5" opacity="0.85" clip-path="url(#c)"/>
  <line x1="255" y1="309" x2="423" y2="309" stroke="white" stroke-width="5" opacity="0.85" clip-path="url(#c)"/>

  <!-- Dark green X panel -->
  <rect x="78" y="112" width="202" height="286" rx="10" fill="#1a5e2a" clip-path="url(#c)"/>

  <!-- X letter -->
  <text
    x="179" y="270"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="162" font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    clip-path="url(#c)">X</text>
</svg>
