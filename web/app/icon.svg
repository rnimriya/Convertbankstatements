<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-bg" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="200" height="200" fill="#1c1c1c"/>

  <!-- Glow blob behind icon -->
  <ellipse cx="100" cy="105" rx="55" ry="62" fill="rgba(56,189,248,0.18)" filter="url(#glow-bg)"/>

  <!-- Document body -->
  <path d="M38 18 L130 18 L162 50 L162 182 L38 182 Z"
        stroke="#38bdf8" stroke-width="6" stroke-linejoin="round"
        fill="rgba(56,189,248,0.06)"
        filter="url(#glow)"/>

  <!-- Folded corner -->
  <path d="M130 18 L130 50 L162 50"
        stroke="#38bdf8" stroke-width="6" stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Grid outer box -->
  <rect x="48" y="72" width="104" height="78" stroke="#38bdf8" stroke-width="4" filter="url(#glow)"/>
  <!-- Horizontal dividers -->
  <line x1="48" y1="98"  x2="152" y2="98"  stroke="#38bdf8" stroke-width="4" filter="url(#glow)"/>
  <line x1="48" y1="124" x2="152" y2="124" stroke="#38bdf8" stroke-width="4" filter="url(#glow)"/>
  <!-- Vertical divider -->
  <line x1="100" y1="72" x2="100" y2="150" stroke="#38bdf8" stroke-width="4" filter="url(#glow)"/>

  <!-- XLSX text -->
  <text
    x="100" y="173"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="24" font-weight="900"
    fill="#38bdf8"
    text-anchor="middle"
    letter-spacing="4"
    filter="url(#glow)">XLSX</text>
</svg>
