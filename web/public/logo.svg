<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 116" fill="none">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Document body -->
  <path d="M13 5 L66 5 L85 24 L85 111 L13 111 Z"
        stroke="#38bdf8" stroke-width="3.8" stroke-linejoin="round"
        fill="rgba(56,189,248,0.05)"
        filter="url(#glow-strong)"/>

  <!-- Folded corner crease -->
  <path d="M66 5 L66 24 L85 24"
        stroke="#38bdf8" stroke-width="3.8" stroke-linejoin="round"
        filter="url(#glow-strong)"/>

  <!-- Grid: 2 cols × 3 rows -->
  <!-- Outer box -->
  <rect x="20" y="32" width="58" height="54" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Horizontal dividers -->
  <line x1="20" y1="50" x2="78" y2="50" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
  <line x1="20" y1="68" x2="78" y2="68" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>
  <!-- Vertical divider (2 columns) -->
  <line x1="49" y1="32" x2="49" y2="86" stroke="#38bdf8" stroke-width="2.5" filter="url(#glow)"/>

  <!-- XLSX text -->
  <text
    x="49" y="103"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="14.5" font-weight="900"
    fill="#38bdf8"
    text-anchor="middle"
    letter-spacing="2.5"
    filter="url(#glow)">XLSX</text>
</svg>
