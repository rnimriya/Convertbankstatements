<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none">

  <!-- Blue vertical pill (offset center-right) -->
  <rect x="40" y="20" width="38" height="61" rx="19" fill="#3B55F5"/>

  <!--
    Circular convert arrows — navy #1A1B40, stroke-width 11, round caps
    Circle: center(46,50) r=32

    Positions (t = degrees CW from 12 o'clock):
      t= 18° → (55.9, 19.6)   large-arc start  (~1 o'clock)
      t=240° → (18.3, 66.0)   large-arc end    (~8 o'clock)
      t=328° → (29.0, 22.9)   small-arc end    (~11 o'clock)
      t=349° → (40.0, 18.6)   dash-1 end
      t=  6° → (49.3, 18.2)   dash-2 start

    Arrowhead 1 — tip at 240° (18.3, 66), CW tangent (-0.5,-0.866) = left-up
      base  = tip + (0.5, 0.866)×9 = (22.8, 73.8)
      wings ±(-0.866, 0.5)×5.5:
        A = (18.0, 76.6)   B = (27.6, 71.0)

    Arrowhead 2 — tip at 328° (29, 22.9), CW tangent (0.848,-0.530) = right-up
      base  = tip + (-0.848, 0.530)×9 = (21.4, 27.7)
      wings ±(-0.530,-0.848)×5.5:
        A = (18.5, 23.0)   B = (24.3, 32.4)
  -->

  <!-- Dash 1: t 328→349 (~11 o'clock) -->
  <path d="M 29 22.9 A 32 32 0 0 1 40 18.6"
        stroke="#1A1B40" stroke-width="11" stroke-linecap="round"/>

  <!-- Dash 2: t 6→18 (~12:05 to 1 o'clock) -->
  <path d="M 49.3 18.2 A 32 32 0 0 1 55.9 19.6"
        stroke="#1A1B40" stroke-width="11" stroke-linecap="round"/>

  <!-- Large CW arc: t 18→240 (222°, large-arc=1, sweep=1) -->
  <path d="M 55.9 19.6 A 32 32 0 1 1 18.3 66"
        stroke="#1A1B40" stroke-width="11" stroke-linecap="butt"/>

  <!-- Arrowhead 1 (left-up, at 8 o'clock) -->
  <path d="M 18.0 76.6 L 18.3 66 L 27.6 71.0 Z" fill="#1A1B40"/>

  <!-- Small CW arc: t 240→328 (88°, large-arc=0, sweep=1) -->
  <path d="M 18.3 66 A 32 32 0 0 1 29 22.9"
        stroke="#1A1B40" stroke-width="11" stroke-linecap="butt"/>

  <!-- Arrowhead 2 (right-up, at 11 o'clock) -->
  <path d="M 18.5 23.0 L 29 22.9 L 24.3 32.4 Z" fill="#1A1B40"/>

</svg>
