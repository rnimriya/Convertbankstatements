<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c"><circle cx="256" cy="256" r="256"/></clipPath>
  </defs>

  <!-- Blue background -->
  <circle cx="256" cy="256" r="256" fill="#1aace2"/>

  <!-- Long flat shadow (diagonal) -->
  <polygon points="198,512 512,198 512,512" fill="#000" opacity="0.17" clip-path="url(#c)"/>

  <!-- Right panel: green spreadsheet -->
  <rect x="262" y="136" width="164" height="238" fill="#1e8038" clip-path="url(#c)"/>

  <!-- White cells: 2 cols × 4 rows -->
  <rect x="269" y="143" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="349" y="143" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="269" y="201" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="349" y="201" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="269" y="259" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="349" y="259" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="269" y="317" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>
  <rect x="349" y="317" width="70" height="50" rx="2" fill="white" opacity="0.93" clip-path="url(#c)"/>

  <!-- Dark spine connecting panels -->
  <rect x="243" y="118" width="20" height="272" fill="#0d4519" clip-path="url(#c)"/>

  <!-- Left panel: dark green parallelogram (3D effect) -->
  <polygon points="90,106 248,118 248,390 90,390" fill="#1c6b31" clip-path="url(#c)"/>

  <!-- Bold X -->
  <text
    x="168" y="252"
    font-family="'Arial Black','Arial Bold',Arial,sans-serif"
    font-size="158" font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    clip-path="url(#c)">X</text>
</svg>
